parameters:
- name: bypassTests
  displayName: 'Publish release even if tests fail'
  type: boolean
  default: false

- name: testVersion
  displayName: 'Test the release pipeline'
  type: string
  default: ''
  
- name: nugetSuffix
  displayName: 'Nuget version suffix (must include "-")'
  type: string
  default: ''

trigger:
  tags:
    include: ['*.*.*']

variables:
  WindowsContainerImage: "onebranch.azurecr.io/windows/ltsc2022/vse2022:latest"
  WindowsHostVersion: '1ESWindows2022'
  # PowerShell scripts in this repo are dev/test/diagnostic helpers, not shipped binaries.
  # Exclude them from CodeSign post-analysis so the in-repo .ps1 files don't break the build.
  ob_sdl_codeSignValidation_excludes: -|**\*.ps1

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/Microsoft.Official.yml@templates
  parameters:
    platform:
      name: "windows_undocked"
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion: 1ESWindows2022
    globalSdl:
      credscan:
        enabled: true
      codesign:
        enabled: true
        break: true
        targetGlob: '**\*.dll;**\*.exe;**\*.sys;**\*.msi;**\*.msix;**\*.msixbundle;**\*.appx;**\*.nupkg'
      perStage:
        credscan:
          enabled: true
      tsa:
        enabled: false
      evidence:
        enabled: false
    git:
      fetchDepth: -1
      fetchTags: true

    stages:
    - template: build-stage.yml@self
      parameters:
        isRelease: true
        packageVersion: ${{ iif(eq(parameters.testVersion, ''), variables['Build.SourceBranchName'], parameters.testVersion) }}
        nugetSuffix: ${{ parameters.nugetSuffix }}
        traceLoggingConfig: $(ReleaseTraceLoggingConfig)
        vsoOrg: microsoft
        vsoProject: Microsoft.WSL

    # DRY RUN: test and flight stages disabled to shorten the feedback loop while
    # validating the CodeSign post-analysis exclusion. REVERT BEFORE MERGING.
    # - template: test-stage.yml@self
    #   parameters:
    #     rs_prerelease_only: false
    #
    # - template: flight-stage.yml@self
    #   parameters:
    #     publishPackage: ${{ iif(eq(parameters.testVersion, ''), true, false) }}
    #     packageVersion: ${{ iif(eq(parameters.testVersion, ''), variables['Build.SourceBranchName'], parameters.testVersion) }}
    #     bypassTests: ${{ parameters.bypassTests }}

    # DRY RUN: keep nuget-stage unconditional so it always runs (this is the stage
    # whose CodeSign post-analysis we're trying to validate). REVERT BEFORE MERGING.
    - template: nuget-stage.yml@self
      parameters:
        isNightly: false
parameters:
- name: isNightly
  type: boolean
  default: false
  
- name: nugetPackages
  type: object
  default:
      - Microsoft.WSL.PluginApi
      - Microsoft.WSL.Containers

stages:
- stage: nuget
  # DRY RUN: dropped 'test' from dependsOn so nuget can run while the test stage
  # is disabled in wsl-build-release-onebranch.yml. nuget-stage consumes outputs
  # only from the package stage. REVERT BEFORE MERGING.
  dependsOn: [package]
  jobs:
  - job: nuget
    displayName: 'Publish nuget packages'
    condition: and(succeeded(), or(eq(variables['Build.Reason'], 'Schedule'), eq('${{ parameters.isNightly }}', false)))
    dependsOn: [] # The stage handles this dependency

    pool:
      type: windows

    variables:
      WSL_NUGET_PACKAGE_VERSION: $[ stageDependencies.package.package.outputs['version.WSL_NUGET_PACKAGE_VERSION'] ]
      NUGET_PLUGIN_HANDSHAKE_TIMEOUT_IN_SECONDS: 60
      NUGET_PLUGIN_REQUEST_TIMEOUT_IN_SECONDS: 60
      ob_outputDirectory: '$(Build.SourcesDirectory)\out'
      ob_artifactBaseName: 'drop_wsl'
      ob_artifactSuffix: '_nuget'

    steps:

    - task: DownloadPipelineArtifact@2
      displayName: Download nuget artifacts
      inputs:
        artifact: "drop_wsl_package"
        path: $(Build.SourcesDirectory)\drop

      # Note: this task might fail if there's been no commits between two nightly pipelines, which is fine.
    # DRY RUN: nuget push replaced with a no-op so we never publish to the live
    # feed during the dry run. Post-analysis still runs at end of job. REVERT
    # BEFORE MERGING.
    - ${{ each package in parameters.nugetPackages }}:
        - script: echo "DRY RUN -- nuget push of ${{ package }}.$(WSL_NUGET_PACKAGE_VERSION).nupkg skipped"
          displayName: "(DRY RUN) Skip push of ${{ package }}"
        # - task: NuGetCommand@2
        #   displayName: Push nuget/${{ package }}.*.nupkg
        #   inputs:
        #     command: 'push'
        #     packagesToPush: $(Build.SourcesDirectory)\drop\nuget\${{ package }}.$(WSL_NUGET_PACKAGE_VERSION).nupkg
        #     nuGetFeedType: 'internal'
        #     publishVstsFeed: wsl
        #     allowPackageConflicts: ${{ parameters.isNightly }}
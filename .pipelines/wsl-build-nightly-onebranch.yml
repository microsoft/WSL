trigger: none

schedules:
# "0 8" = 8AM UTC = 12AM PST
- cron: "0 8 * * *"
  displayName: Nightly build
  branches:
    include: [master]
  always: true

variables:
  WindowsContainerImage: "onebranch.azurecr.io/windows/ltsc2022/vse2022:latest"
  WindowsHostVersion: '1ESWindows2022'

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/Microsoft.NonOfficial.yml@templates
  parameters:
    platform:
      name: "windows_undocked"
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion: 1ESWindows2022
    globalSdl:
      credscan:
        enabled: true
      perStage:
        credscan:
          enabled: true
      tsa:
        enabled: false
    git:
      fetchDepth: -1
      fetchTags: true

    stages:
    - template: build-stage.yml@self
      parameters:
        isRelease: false
        isNightly: true
        vsoOrg: microsoft
        vsoProject: Microsoft.WSL

    - template: test-stage.yml@self
      parameters:
        rs_prerelease_only: false

    - template: nuget-stage.yml@self
      parameters:
        isNightly: true

    - template: asa-stage.yml@self
      # Non-gating for now: ASA publishes findings without failing the build
      # (controlled by ASA_FAIL_ON_NEW in cloudtest/CMakeLists.txt). Flip that to
      # "$true" once the allowlist in tools/devops/asa-expected-findings.json is stable.
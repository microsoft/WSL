name: Sync fork with upstream

on:
  schedule:
    # Hourly during Pacific business hours (8 AM - 6 PM PT = 16:00 - 02:00 UTC next day)
    - cron: '0 16-23 * * 1-5'  # Mon-Fri 16:00-23:00 UTC (8 AM - 3 PM PT)
    - cron: '0 0-1 * * 2-6'    # Tue-Sat 00:00-01:00 UTC (4 PM - 5 PM PT prev day)
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: feature/wsl-for-apps
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/Microsoft/WSL.git

      - name: Fetch upstream
        run: git fetch upstream feature/wsl-for-apps

      - name: Check if update needed
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/feature/wsl-for-apps)
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "upstream=$UPSTREAM" >> "$GITHUB_OUTPUT"
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "Update needed: $LOCAL -> $UPSTREAM"
          fi

      - name: Fast-forward merge
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git merge --ff-only upstream/feature/wsl-for-apps

      - name: Push changes
        if: steps.check.outputs.needs_update == 'true'
        run: git push origin feature/wsl-for-apps

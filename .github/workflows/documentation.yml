name: Build documentation
on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths: ['doc/**']

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  DeployDocs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
        contents: read
        pages: write
        id-token: write
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4
        with:
          # Full history + tags so every released version can be rebuilt.
          fetch-depth: 0

      - name: Install packages
        run: pip install -r doc/requirements.txt --break-system-packages
        shell: bash

      - name: Build versioned documentation
        run: python doc/build_versioned_docs.py --output public
        shell: bash

      - uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

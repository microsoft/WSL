site_name: WSL container API reference
site_description: Versioned API reference for the WSL container (wslc) developer APIs

# This is a standalone MkDocs project covering ONLY the API reference. It is
# built/versioned independently of the main docs (mkdocs.yml) by
# doc/build_versioned_docs.py and published under /api-reference/<version>/.
# Keeping it separate means the version selector and version history apply to
# the API reference alone, not to the rest of the documentation site.
docs_dir: api-reference

# Navigation order is driven by the per-folder .pages files (awesome-pages).
plugins:
    - search
    - awesome-pages
    - mermaid2:
        version: 11.4.1
        arguments:
          securityLevel: 'loose'

theme:
    name: material
    features:
        - navigation.tabs
        - navigation.tracking
        - navigation.sections
        - navigation.top
        - navigation.indexes
        - toc.follow
        - content.code.copy
        - search.suggest
        - search.highlight
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          primary: indigo
          accent: indigo
          toggle:
            icon: material/weather-night
            name: Switch to dark mode
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          primary: indigo
          accent: indigo
          toggle:
            icon: material/weather-sunny
            name: Switch to light mode

markdown_extensions:
    - admonition
    - attr_list
    - md_in_html
    - tables
    - toc:
        permalink: true
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.details
    - pymdownx.superfences

# Renders the version selector in the Material header. The version list is read
# from versions.json, produced by doc/build_versioned_docs.py (mike). This
# selector therefore appears only on the API reference pages.
extra:
    homepage: /
    version:
        provider: mike
